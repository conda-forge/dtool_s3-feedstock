schema_version: 1

context:
  name: dtool_s3
  version: 0.14.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/dtool-s3/dtool-s3-${{ version }}.tar.gz
  sha256: ee87f8ce07f8081bb1e9e28dd57b966f4493323497339409f31dfdf1dcf67341

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - click
    - packaging
    - setuptools
    - dtoolcore
    - dtool_cli
    - boto3

tests:
  - python:
      imports:
        - dtool_s3
        - dtool_s3.storagebroker
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  license: MIT
  license_file: LICENSE.rst
  summary: S3 support for dtool
  homepage: https://github.com/jic-dtool/dtool-s3
  repository: https://github.com/jic-dtool/dtool-s3
  documentation: https://github.com/jic-dtool/dtool-s3

extra:
  recipe-maintainers:
    - pvanheus
    - jan-janssen
    - tjelvar-olsson
